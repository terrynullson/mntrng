name: CI

on:
  push:
    branches: [master, main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build API and Worker
        run: go build -v ./cmd/api ./cmd/worker
      - name: Tests
        run: go test ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: |
          cd web
          npm ci
      - name: Lint
        run: |
          cd web
          npm run lint
      - name: Build
        run: |
          cd web
          npm run build
      - name: Install Playwright browsers
        run: |
          cd web
          npx playwright install chromium --with-deps
      - name: E2E smoke tests
        run: |
          cd web
          npm run test:ci

  docker-build:
    name: Docker build (sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f Dockerfile.api -t mntrng-api:sanity .
      - name: Build Worker image
        run: docker build -f Dockerfile.worker -t mntrng-worker:sanity .

  api-smoke:
    name: API smoke (docker-compose)
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-password
      APP_ENV: ci
      API_PORT: 8080
    steps:
      - uses: actions/checkout@v4
      - name: Start minimal stack (postgres, redis, init, api)
        run: |
          docker compose -f docker-compose.yml up -d postgres redis init api
      - name: Wait for API ready
        run: |
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:${API_PORT}/api/v1/ready" >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done
          echo "API did not become ready in time"
          docker compose -f docker-compose.yml logs api || true
          exit 1
      - name: Smoke health and ready
        run: |
          curl -fsS "http://127.0.0.1:${API_PORT}/api/v1/health" >/dev/null
          curl -fsS "http://127.0.0.1:${API_PORT}/api/v1/ready" >/dev/null
      - name: Shutdown stack
        if: always()
        run: |
          docker compose -f docker-compose.yml down -v
