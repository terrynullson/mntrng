services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hls_monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-hls_monitoring}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  init:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hls_monitoring}?sslmode=disable
      BOOTSTRAP_SEED_ENABLED: ${BOOTSTRAP_SEED_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["init"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      APP_ENV: ${APP_ENV:-development}
      API_PORT: ${API_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hls_monitoring}?sslmode=disable
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      API_METRICS_PUBLIC: ${API_METRICS_PUBLIC:-false}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      API_MAX_BODY_BYTES: ${API_MAX_BODY_BYTES:-1048576}
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:${API_PORT:-8080}/api/v1/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    volumes:
      - app_data:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      APP_ENV: ${APP_ENV:-development}
      WORKER_HEARTBEAT_SEC: ${WORKER_HEARTBEAT_SEC:-15}
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hls_monitoring}?sslmode=disable
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      WORKER_METRICS_PORT: ${WORKER_METRICS_PORT:-9091}
      WORKER_METRICS_TOKEN: ${WORKER_METRICS_TOKEN:-}
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:${WORKER_METRICS_PORT:-9091}/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - app_data:/data
    ports:
      - "127.0.0.1:${WORKER_METRICS_PORT:-9091}:${WORKER_METRICS_PORT:-9091}"

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8080}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8080}
      PORT: ${FRONTEND_PORT:-3000}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  screenshot:
    build:
      context: .
      dockerfile: Dockerfile.screenshot
    environment:
      API_HOST: api
      API_PORT: "8080"
      FRONTEND_HOST: frontend
      SCREENSHOT_BASE_URL: http://frontend:3000
    volumes:
      - .:/app
    depends_on:
      - api
      - frontend
    restart: "no"
    profiles:
      - screenshot

volumes:
  postgres_data:
  redis_data:
  app_data:
